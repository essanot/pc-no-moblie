<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأثير الفأرة - بدون التحكم في اللمس</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .card {
            background-color: #3498db;
            color: white;
            padding: 40px;
            border-radius: 12px;
            font-size: 24px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        /* تأثير الفأرة المعتاد - سيعلق عند اللمس في الجوال */
        .card:hover {
            background-color: #e74c3c;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="card">
        مرر الفأرة هنا <br> (أو المسه من الجوال)
    </div>

</body>
</html>
